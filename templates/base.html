{% load static %}
<!doctype html>
<html lang="es-AR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <title>{% block title %}Caudal{% endblock %}</title>
  <link rel="icon" href="{% static 'brand/caudal-favicon.svg' %}" type="image/svg+xml">
  <link rel="icon" href="{% static 'brand/caudal-favicon-32.png' %}" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="{% static 'brand/caudal-appicon-192.png' %}">
  <link rel="manifest" href="{% url 'manifest' %}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Caudal">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <script defer src="{% static 'vendor/alpine.min.js' %}"></script>
  <script src="{% static 'vendor/htmx.min.js' %}"></script>
  {% block head %}{% endblock %}
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
  <main class="app">
    {% block content %}{% endblock %}
  </main>
  {% block tabbar %}{% include "partials/tabbar.html" %}{% endblock %}
</body>
</html>
