services:
  - type: web
    name: caudal
    runtime: python
    plan: free
    buildCommand: >-
      pip install uv &&
      uv sync &&
      uv run python manage.py collectstatic --noinput &&
      uv run python manage.py migrate &&
      uv run python manage.py ensure_superuser &&
      (uv run python manage.py seed_data || true)
    # --timeout kills a worker stuck on a slow request (e.g. a heavy import) so
    # one request can't hang the only worker on the free plan.
    startCommand: uv run gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 30
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # Panel de admin fuera de la ruta /admin/ conocida. Cambialo por lo que
      # quieras (mantené la barra final).
      - key: ADMIN_URL
        value: "panel-privado/"
      # Detrás del proxy TLS de Render hay 1 proxy delante: necesario para que
      # django-axes lea la IP real del cliente (X-Forwarded-For) al bloquear.
      - key: AXES_PROXY_COUNT
        value: "1"
      # Primer login admin, creado solo en el build (el plan free no tiene shell
      # para correr createsuperuser a mano). Cambiá el usuario o la contraseña
      # generada desde el dashboard de Render cuando quieras.
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      # Configurar a mano en el dashboard de Render (no se pueden generar solos):
      #   DATABASE_URL         -> la URL de Postgres de Neon (postgres://...)
      #   ALLOWED_HOSTS        -> el dominio que te asigna Render (ej. caudal.onrender.com)
      #   CSRF_TRUSTED_ORIGINS -> https://<ese mismo dominio>
