{% load icons %}
{# Reusable add/edit form. Caller passes: cat (instance or empty), post_url, submit_label. #}
<form class="save-form" hx-post="{{ post_url }}" hx-target="#categories-body" hx-swap="innerHTML"
      x-data="{ icon: '{{ cat.icon|default:'' }}' }"
      {% if not cat %}@htmx:after-request="if ($event.detail.successful) { $el.reset(); icon = '' }"{% endif %}>
  <div class="field">
    <label>Nombre</label>
    <input type="text" name="name" value="{{ cat.name|default:'' }}"
           placeholder="Delivery, Alquiler, Nafta…" required aria-label="Nombre">
  </div>
  <div class="two-col">
    <div class="field">
      <label>Tipo</label>
      <select name="kind" aria-label="Tipo">
        {% for value, label in kinds %}
          <option value="{{ value }}" {% if cat.kind == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label>Grupo (opcional)</label>
      <select name="parent" aria-label="Grupo">
        <option value="">— sin grupo —</option>
        {% for p in parent_options %}
          {% if not cat or p.id != cat.id %}
            <option value="{{ p.id }}" {% if cat.parent_id == p.id %}selected{% endif %}>{{ p.name }}</option>
          {% endif %}
        {% endfor %}
      </select>
    </div>
  </div>
  <div class="field">
    <label>Ícono</label>
    <input type="hidden" name="icon" :value="icon">
    <div class="icon-picker">
      {% for name in icon_choices %}
        <button type="button" class="icon-pick" :class="{ sel: icon === '{{ name }}' }"
                @click="icon = '{{ name }}'" aria-label="{{ name }}">{% icon name "icon" %}</button>
      {% endfor %}
    </div>
  </div>
  {% if cat %}
    <div class="two-col">
      <button class="btn btn-primary" type="submit">Guardar cambios</button>
      <button class="btn danger" type="button"
              hx-post="{% url 'transactions:delete_category' cat.id %}"
              hx-target="#categories-body" hx-swap="innerHTML"
              hx-confirm="¿Borrar esta categoría? Sus movimientos quedan sin categoría.">
        {% icon "trash-2" "icon" %} Borrar
      </button>
    </div>
  {% else %}
    <button class="btn btn-primary" type="submit" style="width:100%">Guardar categoría</button>
  {% endif %}
</form>
