{% load money icons %}
<li class="tx-row" id="tx-{{ tx.id }}">
  <button class="paid-toggle {% if tx.is_paid %}paid{% endif %}"
          hx-post="{% url 'dashboard:toggle_paid' tx.id %}"
          hx-target="#tx-{{ tx.id }}" hx-swap="outerHTML"
          aria-label="{% if tx.is_paid %}Pagado{% else %}Pendiente{% endif %}">{% icon "check" "icon" %}</button>
  <div class="tx-main">
    <div class="tx-desc">{{ tx.description|default:tx.category.name|default:"—" }}</div>
    <div class="tx-meta">
      <span>{{ tx.date|date:"d/m" }}</span>
      <span>· {{ tx.wallet.name }}</span>
      {% if not tx.is_paid %}<span class="pill warn">pendiente</span>{% endif %}
      {% if tx.is_shared %}<span class="pill">mi parte $ {{ tx.own_amount|money }}</span>{% endif %}
    </div>
  </div>
  <span class="tx-amount tnum">$ {{ tx.amount|money }}</span>
</li>
