{% load icons %}
{% comment %}"Guardar todo" bulk-confirm control. Own partial so a single save can
refresh the "sin revisar" count out-of-band.{% endcomment %}
{% if unreviewed %}
  <button class="btn" style="margin-bottom:1rem"
          hx-post="{% url 'dashboard:statement_confirm_all' wallet.id period %}"
          hx-target="#statement-body" hx-swap="innerHTML"
          hx-confirm="¿Confirmar los {{ unreviewed }} consumos sin revisar tal como están (con la categoría sugerida y mi parte 100%)?">
    {% icon "check" "icon" %} Guardar todo ({{ unreviewed }} sin revisar)
  </button>
{% endif %}
